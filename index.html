<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光启吃点啥</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @charset "UTF-8";
        :root { 
            --m-blue: #91ADCF; --m-purple: #B8A6D9; --m-green: #A3B18A;   
            --m-cream: #FFF9F0; 
            --m-gray: #7F8C8D; --bg: #F4F7F9; --text-main: #455A64;
            --dice-text: #546E7A;
            --btn-edit: #607D8B;
            --btn-del: #E57373;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, "PingFang SC", sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #FFFFFF; border-radius: 24px; padding: 25px 30px; width: 100%; max-width: 1000px; box-shadow: 0 10px 40px rgba(145, 173, 207, 0.1); position: relative; }
        h2 { color: var(--m-blue); margin: 0 0 20px 0; font-size: 22px; font-weight: 600; text-align: center; letter-spacing: 2px; }

        #custom-confirm {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 1.5px solid var(--m-blue); border-radius: 16px;
            padding: 20px 30px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            align-items: center; flex-direction: column; gap: 15px; animation: zoomIn 0.2s ease;
        }
        @keyframes zoomIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        #custom-confirm span { font-size: 15px; font-weight: 600; color: var(--text-main); }
        .confirm-btns { display: flex; gap: 10px; }
        .confirm-btns button { padding: 8px 20px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-yes { background: var(--m-blue); color: white; }
        .btn-no { background: #EEE; color: var(--m-gray); }

        #display-area { 
            background: var(--m-cream); border: 1.5px solid #F0E6D6; margin-bottom: 25px; 
            border-radius: 18px; padding: 20px; text-align: center; min-height: 140px; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .res { font-size: 24px; color: var(--m-green); font-weight: 700; margin-bottom: 6px; }
        .sub-res { font-size: 13px; color: var(--m-gray); line-height: 1.5; }
        .res-detail { font-size: 12px; color: var(--m-gray); margin-top: 4px; }
        
        .tag-active { 
            position: absolute; top: 8px; right: 8px;
            background: #E8F5E9; padding: 1px 6px; border-radius: 5px; 
            color: var(--m-green); font-size: 9px; border: 1px solid var(--m-green); 
            font-weight: 600;
        }

        .interaction-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .p-panel { border: 1.5px solid #D6E0EA; padding: 18px; border-radius: 16px; text-align: center; background: #FFF; transition: 0.3s; }
        .p-panel.locked { border-color: var(--m-blue); background: #F8FBFF; }
        
        .dice-view { font-size: 38px; height: 45px; line-height: 45px; margin-bottom: 12px; color: #E0E7EE; font-weight: 700; }
        .p-panel.locked .dice-view { color: var(--dice-text); }

        .energy-btn { background: transparent; border: 1.2px solid var(--m-blue); color: var(--m-blue); padding: 7px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .energy-btn:hover:not(:disabled) { background: var(--m-blue); color: white; }

        .control-panel { display: flex; gap: 15px; margin-bottom: 25px; }
        .control-panel button { flex: 1; border: none; height: 46px; font-size: 14px; color: white; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-random { background: var(--m-purple); }
        .btn-decode { background: var(--m-blue); }
        .btn-decode:disabled { background: #E0E0E0; color: #A0A0A0; cursor: not-allowed; }

        .list-header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 10px; }
        .menu-title { font-size: 15px; font-weight: 600; color: #78909C; }
        .filter-zone { font-size: 12px; color: var(--m-gray); display: flex; align-items: center; gap: 5px; cursor: pointer; }

        .list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-height: 400px; overflow-y: auto; padding: 4px; }
        
        .item { 
            background: var(--m-cream); border: 1.5px solid #FFD54F; border-radius: 16px; 
            padding: 12px; transition: all 0.2s ease; position: relative;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 150px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 213, 79, 0.15);
        }
        .item:hover { transform: translateY(-2px); }

        .item.unselected {
            background: #F5F5F5;
            border-color: #E0E0E0;
            filter: grayscale(40%);
            opacity: 0.75;
            box-shadow: none;
        }
        .item.unselected .tag-active {
            background: #E0E0E0;
            color: #757575;
            border-color: #BDBDBD;
        }

        .shop-name { font-size: 14px; font-weight: 700; color: #546E7A; margin-bottom: 4px; padding-right: 35px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shop-meta { font-size: 10px; color: #90A4AE; line-height: 1.4; }
        
        .item-btn-group { display: flex; gap: 4px; margin-top: auto; padding-top: 10px; }
        .item-btn-group button { 
            flex: 1; padding: 5px 0; font-size: 10px; font-weight: 700; 
            background: #FFF; border-radius: 6px; border: 1px solid #EEDFCA; 
            cursor: pointer; transition: 0.2s;
        }
        .item.unselected .item-btn-group button { border-color: #E0E0E0; }
        .btn-edit-trigger { color: var(--btn-edit) !important; border-color: #CFD8DC !important; }
        .btn-edit-trigger:hover { background: #F4F7F9 !important; border-color: var(--btn-edit) !important; }
        .btn-del-trigger { color: var(--btn-del) !important; border-color: #F8D7DA !important; }
        .btn-del-trigger:hover { background: #FFF5F5 !important; border-color: var(--btn-del) !important; }

        .add-zone { margin-top: 25px; padding: 18px; background: #F8FAFB; border-radius: 18px; border: 1.2px dashed #D6E0EA; }
        .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .add-grid input { padding: 9px; border-radius: 8px; border: 1px solid #E0E7EE; outline: none; font-size: 13px; }
        .btn-add { background: var(--m-blue); color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 10px; width: 100%; font-weight: 600; font-size: 13px; cursor: pointer; }
        
        .pulse { animation: pulse 1.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.02); } 100% { transform: scale(1); } }

        @media (max-width: 768px) { .list { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="custom-confirm">
            <span>确认移除该餐厅？</span>
            <div class="confirm-btns">
                <button class="btn-yes" id="confirm-yes">确认</button>
                <button class="btn-no" id="confirm-no">取消</button>
            </div>
        </div>

        <h2>✨ 光启吃点啥</h2>
        <div id="display-area">
            <div id="res" class="res">LOADING...</div>
            <div id="sub-res" class="sub-res">正在同步云端美食能量池...</div>
        </div>

        <div class="interaction-zone">
            <div class="p-panel" id="p1-card">
                <div class="dice-view" id="p1-dice">❓</div>
                <button class="energy-btn" id="p1-btn" onclick="lockPlayer(1)">Player 1 注入能量</button>
            </div>
            <div class="p-panel" id="p2-card">
                <div class="dice-view" id="p2-dice">❓</div>
                <button class="energy-btn" id="p2-btn" onclick="lockPlayer(2)" disabled>Player 2 注入能量</button>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn-random" id="lucky-btn" onclick="luckyDraw()">🌀 灵感突袭</button>
            <button class="btn-decode" id="final-combine-btn" onclick="executeSumLogic()" disabled>🔥 能量合体：启动！</button>
        </div>

        <div class="list-header">
            <div class="menu-title">🍱 候选池</div>
            <label class="filter-zone">
                <input type="checkbox" id="meican-filter" onchange="show()"> 只显示美餐卡
            </label>
        </div>
        <div id="list" class="list"></div>

        <div class="add-zone">
            <div class="add-grid">
                <input id="add-name" style="grid-column: span 2;" placeholder="餐厅名称">
                <input id="add-dish" placeholder="特色菜">
                <input id="add-price" type="number" placeholder="均价 (¥)">
                <input id="add-cal" type="number" placeholder="热量 (kcal)">
                <div style="display:flex; align-items:center; gap:5px; font-size:12px;">
                    <input type="checkbox" id="add-meican"> 美餐卡
                </div>
                <button class="btn-add" id="save-btn" style="grid-column: span 2;" onclick="addNewShop()">确认添加/保存修改</button>
            </div>
        </div>
    </div>

<script>
    // ==================== 【Supabase 配置区域】 ====================
    const SUPABASE_URL = 'https://shqabcrgncrtatrqkooy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_I30if_8h5G1XyadhSqTCXQ_c2YDhXtT';
    
    // 初始化客户端
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ============================================================

    let shop = [];
    let p1Value = null, p2Value = null;
    let editIndex = -1;
    let deletePendingIndex = -1;

    // 从 Supabase 云端拉取最新数据
    async function fetchFromCloud() {
        try {
            let { data: RestaurantData, error } = await supabaseClient
                .from('Restaurant')
                .select('*')
                .order('created_at', { ascending: true });
                
            if (error) throw error;

            if (!RestaurantData || RestaurantData.length === 0) {
                await initDefaultShops();
                return;
            }
            
            shop = RestaurantData;
            document.getElementById("res").innerText = "READY";
            // 🚀 这里快捷键提示也同步微调了
            document.getElementById("sub-res").innerText = "快捷键：A [Player 1] · L [Player 2] · Enter [合体启动]";
            show();
        } catch (error) {
            console.error('云端数据拉取失败:', error);
            document.getElementById("res").innerText = "ERROR";
            document.getElementById("sub-res").innerText = "连接云端失败，请检查密钥或建表字段";
        }
    }

    async function initDefaultShops() {
        let defaultShops = [
            { name: "长者食堂", dish: "招牌红烧肉", price: 20, meican: true, cal: 650 },
            { name: "阿塞", dish: "爆辣炒码面", price: 28, meican: false, cal: 720 },
            { name: "阿莲家", dish: "酸菜卤肉饭", price: 25, meican: true, cal: 580 },
            { name: "万利记", dish: "老长沙米粉", price: 22, meican: true, cal: 510 }
        ];
        
        const { error } = await supabaseClient.from('Restaurant').insert(defaultShops);
        if (error) console.error('默认初始化失败:', error);
        fetchFromCloud();
    }

    function show() {
        let html = "";
        let isMeicanOnly = document.getElementById('meican-filter').checked;
        shop.forEach((item, i) => {
            if (isMeicanOnly && !item.meican) return;
            let meicanTag = item.meican ? '<span class="tag-active">美餐卡 OK</span>' : '';
            
            html += `<div class="item" id="card-${item.id}" onclick="toggleCardSelection(event, '${item.id}')">
                ${meicanTag}
                <div>
                    <input type="checkbox" checked id="c-${item.id}" style="display:none;">
                    <div class="shop-name" title="${item.name}">${item.name}</div>
                    <div class="shop-meta">✨：${item.dish}</div>
                    <div class="shop-meta">￥${item.price || '?'} | ${item.cal || '?'} kcal</div>
                </div>
                <div class="item-btn-group">
                    <button class="btn-edit-trigger" onclick="editItem(event, ${i})">EDIT</button>
                    <button class="btn-del-trigger" onclick="delItemTrigger(event, ${i})">DELETE</button>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    function toggleCardSelection(event, id) {
        if (event.target.tagName.toLowerCase() === 'button') return;

        let checkBox = document.getElementById("c-" + id);
        let card = document.getElementById("card-" + id);
        if (checkBox && card) {
            checkBox.checked = !checkBox.checked;
            if (checkBox.checked) {
                card.classList.remove("unselected");
            } else {
                card.classList.add("unselected");
            }
        }
    }

    function delItemTrigger(event, idx) {
        if(event) event.stopPropagation();
        deletePendingIndex = idx;
        document.getElementById('custom-confirm').style.display = 'flex';
    }

    document.getElementById('confirm-yes').onclick = async function() {
        if (deletePendingIndex !== -1) {
            const targetId = shop[deletePendingIndex].id;
            document.getElementById('custom-confirm').style.display = 'none';
            document.getElementById("res").innerText = "DELETING...";
            
            const { error } = await supabaseClient.from('Restaurant').delete().eq('id', targetId);
            if (error) console.error('删除失败:', error);
            
            deletePending
