<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光启吃点啥</title>
    <style>
        @charset "UTF-8";
        :root { 
            --m-blue: #91ADCF; --m-purple: #B8A6D9; --m-green: #A3B18A;   
            --m-cream: #FFF9F0; --m-gray: #7F8C8D; --bg: #F4F7F9; --text-main: #455A64;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, "PingFang SC", sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #FFFFFF; border-radius: 24px; padding: 25px 30px; width: 100%; max-width: 780px; box-shadow: 0 10px 40px rgba(145, 173, 207, 0.1); }
        
        /* 标题更新 */
        h2 { color: var(--m-blue); margin: 0 0 20px 0; font-size: 22px; font-weight: 600; text-align: center; letter-spacing: 2px; }

        #display-area { 
            background: var(--m-cream); border: 1.5px solid #F0E6D6; margin-bottom: 25px; 
            border-radius: 18px; padding: 20px; text-align: center; min-height: 140px; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .res { font-size: 24px; color: var(--m-green); font-weight: 700; margin-bottom: 6px; }
        .sub-res { font-size: 13px; color: var(--m-gray); line-height: 1.5; }
        .res-detail { font-size: 12px; color: var(--m-gray); margin-top: 4px; }
        .tag-active { background: #E8F5E9; padding: 2px 10px; border-radius: 6px; color: var(--m-green); display: inline-block; margin-top: 6px; font-size: 11px; border: 1px solid var(--m-green); }

        .interaction-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .p-panel { border: 1.5px solid #D6E0EA; padding: 18px; border-radius: 16px; text-align: center; background: #FFF; transition: 0.3s; }
        .p-panel.locked { border-color: var(--m-blue); background: #F8FBFF; }
        .p-title { font-size: 11px; font-weight: 600; margin-bottom: 12px; color: #ABB7C4; }
        .dice-view { font-size: 38px; height: 45px; line-height: 45px; margin-bottom: 12px; color: #E0E7EE; }
        .p-panel.locked .dice-view { color: var(--m-blue); }

        .energy-btn { background: transparent; border: 1.2px solid var(--m-blue); color: var(--m-blue); padding: 7px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .energy-btn:hover:not(:disabled) { background: var(--m-blue); color: white; }

        .control-panel { display: flex; gap: 15px; margin-bottom: 25px; }
        .control-panel button { flex: 1; border: none; height: 46px; font-size: 14px; color: white; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-random { background: var(--m-purple); }
        .btn-decode { background: var(--m-blue); }
        .btn-decode:disabled { background: #E0E0E0; color: #A0A0A0; cursor: not-allowed; }

        .menu-title { font-size: 15px; font-weight: 600; margin: 15px 0 10px; color: #78909C; }
        .list { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; max-height: 280px; overflow-y: auto; padding: 4px; }
        .item { background: #FDFDFD; border: 1px solid #EDF1F5; border-radius: 16px; padding: 14px; transition: 0.2s; }
        .shop-name { font-size: 15px; font-weight: 600; color: #546E7A; margin-bottom: 4px; }
        .shop-meta { font-size: 12px; color: #90A4AE; line-height: 1.6; }
        .item-btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .item-btn-group button { flex: 1; padding: 5px 0; font-size: 11px; background: transparent; border-radius: 8px; border: 1px solid #ECEFF1; color: #90A4AE; cursor: pointer; }

        .add-zone { margin-top: 25px; padding: 18px; background: #F8FAFB; border-radius: 18px; border: 1.2px dashed #D6E0EA; }
        .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .add-grid input { padding: 9px; border-radius: 8px; border: 1px solid #E0E7EE; outline: none; font-size: 13px; }
        .btn-add { background: var(--m-blue); color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 10px; width: 100%; font-weight: 600; font-size: 13px; cursor: pointer; }
        
        .pulse { animation: pulse 1.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(145, 173, 207, 0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>✨ 光启吃点啥</h2>
                
        <div id="display-area">
            <div id="res" class="res">READY</div>
            <div id="sub-res" class="sub-res">快捷键：A [P1 能量] · L [P2 能量] · Enter [执行解密]</div>
        </div>

        <div class="interaction-zone">
            <div class="p-panel" id="p1-card">
                <div class="p-title">OPERATOR 01 (P1) [ A ]</div>
                <div class="dice-view" id="p1-dice">❓</div>
                <button class="energy-btn" id="p1-btn" onclick="lockPlayer(1)">注入 P1 能量</button>
            </div>
            <div class="p-panel" id="p2-card">
                <div class="p-title">OPERATOR 02 (P2) [ L ]</div>
                <div class="dice-view" id="p2-dice">❓</div>
                <button class="energy-btn" id="p2-btn" onclick="lockPlayer(2)" disabled>注入 P2 能量</button>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn-random" id="lucky-btn" onclick="luckyDraw()">终端强制随机</button>
            <button class="btn-decode" id="final-combine-btn" onclick="executeSumLogic()" disabled>执行双轴合数解密</button>
        </div>

        <div class="menu-title">🍱 候选池</div>
        <div style="text-align:right; margin-bottom:8px;">
            <input type="checkbox" id="filterOnlyMei" onchange="show()"> 
            <label for="filterOnlyMei" style="font-size:12px; color:var(--m-gray); cursor:pointer;"> 只显示美餐卡</label>
        </div>
        <div class="list" id="list"></div>

        <div class="add-zone">
            <div class="add-grid">
                <input id="add-name" style="grid-column: span 2;" placeholder="餐厅名称">
                <input id="add-dish" placeholder="特色菜">
                <input id="add-price" type="number" placeholder="均价 (¥)">
                <input id="add-cal" type="number" placeholder="热量 (kcal)">
                <div style="display:flex; align-items:center; gap:5px; font-size:12px; color:var(--m-gray);">
                    <input type="checkbox" id="add-meican" style="width:auto;"> 美餐卡
                </div>
                <button class="btn-add" style="grid-column: span 2;" onclick="addNewShop()">确认添加</button>
            </div>
        </div>
    </div>

<script>
    let shop = [
        { name: "长者食堂", dish: "招牌红烧肉", price: 20, meican: true, cal: 650 },
        { name: "阿塞", dish: "爆辣炒码面", price: 28, meican: false, cal: 720 },
        { name: "阿莲家", dish: "酸菜卤肉饭", price: 25, meican: true, cal: 580 },
        { name: "万利记", dish: "老长沙米粉", price: 22, meican: true, cal: 510 }
    ];
    let p1Value = null, p2Value = null;

    function show() {
        let html = "";
        const onlyMei = document.getElementById("filterOnlyMei").checked;
        shop.forEach((item, i) => {
            if(onlyMei && !item.meican) return;
            let meicanTag = item.meican ? '<span class="mc-badge tag-active">美餐卡 OK</span>' : '<span class="mc-badge tag-active" style="background:#eee; color:#999; border:none;">不支持</span>';
            html += `<div class="item"><input type="checkbox" checked id="c${i}" style="margin-bottom:8px;"><div class="shop-name">${item.name}</div><div class="shop-meta">✨ 必点：${item.dish}</div><div class="shop-meta">￥${item.price || '?'} | ${item.cal || '?'} kcal</div><div>${meicanTag}</div><div class="item-btn-group"><button onclick="delItem(${i})">删除</button></div></div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    function lockPlayer(num) {
        const emojis = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
        let btn = document.getElementById("p" + num + "-btn"), view = document.getElementById("p" + num + "-dice"), card = document.getElementById("p" + num + "-card");
        btn.disabled = true; card.classList.add("locked");
        
        let count = 0;
        let timer = setInterval(() => {
            view.innerText = emojis[Math.floor(Math.random() * 6)];
            if (++count > 12) {
                clearInterval(timer);
                let final = Math.floor(Math.random() * 6) + 1;
                view.innerText = emojis[final-1] + ` (${final})`;
                if(num === 1) { 
                    p1Value = final; 
                    document.getElementById("p2-btn").disabled = false; 
                    document.getElementById("res").innerText = ""; 
                    document.getElementById("sub-res").innerText = "P1 能量已就绪，等待 P2 注入..."; 
                } else { 
                    p2Value = final; 
                    document.getElementById("final-combine-btn").disabled = false; 
                    document.getElementById("final-combine-btn").classList.add("pulse"); 
                    document.getElementById("res").innerText = ""; 
                    document.getElementById("sub-res").innerText = "能量已满，请执行解密指令"; 
                }
            }
        }, 60);
    }

    function formatOutput(target, info) {
        document.getElementById("res").innerText = ">> " + target.name;
        document.getElementById("sub-res").innerHTML = `
            <div style="color:var(--m-green); font-weight:700;">解密完成</div>
            <span style="color:var(--text-main); font-weight:600;">✨ 推荐：${target.dish}</span><br>
            <div class="res-detail">
                人均 ¥${target.price} | 预计 ${target.cal} kcal<br>
                ${target.meican ? '<span class="tag-active">支持美餐卡</span>' : '<span class="tag-active" style="background:#f5f5f5; color:#999; border:none;">现金支付</span>'}<br>
                <small style="opacity:0.6; margin-top:4px; display:block;">[ ${info} ]</small>
            </div>
        `;
    }

    function executeSumLogic() {
        let arr = getAvailable();
        if (!arr.length) return;
        document.getElementById("final-combine-btn").disabled = true;
        document.getElementById("final-combine-btn").classList.remove("pulse");
        let sum = p1Value + p2Value;
        let target = arr[sum % arr.length];
        let count = 0;
        let timer = setInterval(() => {
            document.getElementById("res").innerText = "DECRYPTING: " + Math.random().toString(36).substring(7).toUpperCase();
            if(++count > 15) {
                clearInterval(timer);
                formatOutput(target, `合数算法: ${p1Value}+${p2Value}=${sum}`);
                setTimeout(resetInteraction, 8000);
            }
        }, 80);
    }

    function luckyDraw() {
        let arr = getAvailable();
        if(!arr.length) return;
        let luckyBtn = document.getElementById("lucky-btn");
        luckyBtn.disabled = true;
        resetInteraction();
        let target = arr[Math.floor(Math.random() * arr.length)];
        let count = 0;
        let timer = setInterval(() => {
            document.getElementById("res").innerText = "RANDOMIZING: " + Math.random().toString(36).substring(7).toUpperCase();
            if(++count > 15) {
                clearInterval(timer);
                formatOutput(target, "强制随机抽选");
                luckyBtn.disabled = false;
            }
        }, 80);
    }

    function resetInteraction() {
        p1Value = null; p2Value = null;
        document.getElementById("p1-btn").disabled = false;
        document.getElementById("p2-btn").disabled = true;
        document.getElementById("final-combine-btn").disabled = true;
        document.querySelectorAll(".p-panel").forEach(p => p.classList.remove("locked"));
        document.querySelectorAll(".dice-view").forEach(v => v.innerText = "❓");
        document.getElementById("res").innerText = "READY";
        document.getElementById("sub-res").innerText = "快捷键：A [P1 能量] · L [P2 能量] · Enter [执行解密]";
    }

    function getAvailable() {
        let a = [];
        shop.forEach((s, i) => { if(document.getElementById("c"+i).checked) a.push(s); });
        return a;
    }
    function addNewShop() {
        let name = document.getElementById("add-name").value.trim();
        if(!name) return;
        shop.push({ name: name, dish: document.getElementById("add-dish").value.trim() || "神秘美食", price: document.getElementById("add-price").value || 0, cal: document.getElementById("add-cal").value || 0, meican: document.getElementById("add-meican").checked });
        document.getElementById("add-name").value = ""; show();
    }
    function delItem(idx){ if(confirm("确认移除？")){ shop.splice(idx,1); show(); } }
    window.addEventListener("keydown", (e) => {
        if ((e.key === "a" || e.key === "A") && !document.getElementById("p1-btn").disabled) lockPlayer(1);
        if ((e.key === "l" || e.key === "L") && !document.getElementById("p2-btn").disabled) lockPlayer(2);
        if (e.key === "Enter" && !document.getElementById("final-combine-btn").disabled) executeSumLogic();
    });
    show();
</script>
</body>
</html>
